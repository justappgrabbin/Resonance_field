name: Resonance Bootstrap

on:
  workflow_dispatch:
  push:
    paths:
      - 'manifest.json'

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read Manifest
        id: manifest
        run: |
          echo "name=$(jq -r .name manifest.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"
          echo "modules=$(jq -c .modules manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Scaffold Structure
        run: |
          mkdir -p src/{engine,agent,components,services}
          mkdir -p server/{services,routes}
          mkdir -p public/ephemeris

      - name: Generate Module Stubs
        run: |
          echo '${{ steps.manifest.outputs.modules }}' | jq -r '.[] | "\(.path)|\(.template)"' | while IFS='|' read -r path template; do
            mkdir -p "$(dirname "$path")"
            
            if [ "$template" = "component" ]; then
              name=$(basename "$path" .jsx | sed 's/.*/\u&/' | sed 's/-//g')
            else
              name=$(basename "$path" .js | sed 's/.*/\u&/' | sed 's/-//g')
            fi
            
            case "$template" in
              engine)
                cat > "$path" << EOF
          export class ${name} {
            constructor() {
              this.initialized = false;
            }
            async init() {
              this.initialized = true;
            }
          }
          EOF
                ;;
              component)
                cat > "$path" << EOF
          import React from 'react';
          export const ${name} = () => {
            return <div>Resonance Component</div>;
          };
          EOF
                ;;
              service)
                cat > "$path" << EOF
          export class ${name} {
            async process() {
              return { status: 'ready' };
            }
          }
          EOF
                ;;
            esac
          done

      - name: Generate Package Files
        run: |
          cat > package.json << EOF
          {
            "name": "${{ steps.manifest.outputs.name }}",
            "version": "${{ steps.manifest.outputs.version }}",
            "private": true,
            "type": "module",
            "engines": {
              "node": ">=22"
            },
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "preview": "vite preview",
              "server": "node server/server.js"
            },
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0",
              "react-router-dom": "^6.20.0",
              "react-dropzone": "^14.2.0",
              "openai": "^4.20.0",
              "pdf-parse": "^1.1.1",
              "mammoth": "^1.6.0",
              "unzipper": "^0.10.14",
              "tar": "^6.2.0",
              "multer": "^1.4.5-lts.1",
              "cors": "^2.8.5",
              "express": "^4.18.2"
            },
            "devDependencies": {
              "@vitejs/plugin-react": "^4.2.0",
              "vite": "^5.0.0",
              "vite-plugin-pwa": "^0.17.0"
            }
          }
          EOF

          cat > vite.config.js << 'EOF'
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react';
          import { VitePWA } from 'vite-plugin-pwa';

          export default defineConfig({
            plugins: [
              react(),
              VitePWA({
                registerType: 'autoUpdate',
                manifest: {
                  name: 'Resonance Field',
                  short_name: 'Resonance',
                  theme_color: '#0a0a0f',
                  background_color: '#0a0a0f',
                  display: 'standalone',
                  start_url: '/',
                  icons: [
                    { src: '/icon-192.png', sizes: '192x192', type: 'image/png' },
                    { src: '/icon-512.png', sizes: '512x512', type: 'image/png' }
                  ]
                }
              })
            ],
            server: {
              proxy: {
                '/api': 'http://localhost:3001'
              }
            }
          });
          EOF

      - name: Commit and Push
        run: |
          git config user.name "Resonance Agent"
          git config user.email "agent@resonance.local"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔧 [AUTO] Bootstrap scaffold v${{ steps.manifest.outputs.version }}"
            git push
          fi
